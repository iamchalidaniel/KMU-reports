name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render (Backend)
        run: |
          curl "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
        if: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK != '' }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render (Frontend)
        run: |
          curl "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
        if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ] && [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed or partial"
            exit 1
          fi
